<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Top Left: Sun -->
  <rect x="16" y="16" width="240" height="240" rx="28" fill="#8FE3FF"/>
  <circle cx="136" cy="136" r="42" fill="#FFE082" stroke="#000" stroke-width="12"/>
  <g stroke="#000" stroke-width="12" stroke-linecap="round">
    <line x1="136" y1="48" x2="136" y2="72"/>
    <line x1="136" y1="200" x2="136" y2="224"/>
    <line x1="48" y1="136" x2="72" y2="136"/>
    <line x1="200" y1="136" x2="224" y2="136"/>
    <line x1="72" y1="72" x2="88" y2="88"/>
    <line x1="184" y1="184" x2="200" y2="200"/>
    <line x1="72" y1="200" x2="88" y2="184"/>
    <line x1="184" y1="88" x2="200" y2="72"/>
  </g>

  <!-- Top Right: Wind -->
  <rect x="256" y="16" width="240" height="240" rx="28" fill="#FFE082"/>
  <path d="M300 110 H420 Q450 110 450 90 Q450 70 420 70"
        fill="none" stroke="#000" stroke-width="14" stroke-linecap="round"/>
  <path d="M300 150 H400"
