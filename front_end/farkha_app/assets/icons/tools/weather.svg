  <!-- Small Drop -->
  <path d="M175 325
           C160 350 150 365 150 385
           C150 410 165 425 175 425
           C185 425 200 410 200 385
           C200 365 190 350 175 325Z"
        fill="#8FE3FF" stroke="#000" stroke-width="12"/>

  <!-- Bottom Right: Cloud -->
  <rect x="256" y="256" width="240" height="240" rx="28" fill="#FF9EA1"/>
  <path d="M300 400
           Q300 360 340 360
           Q350 330 380 330
           Q420 330 430 360
           Q460 360 460 390
           Q460 420 430 420
